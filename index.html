<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boss Files — Elite Academic System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Reem+Kufi:wght@400..700&family=Aref+Ruqaa:wght@400;700&display=swap');
        :root {
            --bg-deep: #020617;
            --bg-deep-rgb: 2, 6, 23;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --subject-accent: #3b82f6;
            --subject-accent-low: rgba(59, 130, 246, 0.1);
            --subject-accent-rgb: 59, 130, 246;
            --slate-100: #f8fafc;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-sans: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
        }

        .light-mode {
            --bg-deep: #f1f5f9;
            --bg-deep-rgb: 241, 245, 249;
            --text-main: #0f172a;
            --text-muted: #475569;
            --slate-100: #0f172a;
            --slate-300: #334155;
            --slate-400: #64748b;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(15, 23, 42, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-sans);
            overflow-x: hidden;
            line-height: 1.5;
            transition: background-color 0.8s ease;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l5.878 18.09h19.022l-15.389 11.18 5.878 18.09-15.389-11.18-15.389 11.18 5.878-18.09-15.389-11.18h19.022z' fill='%23ffd700' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        /* Name Prompt Modal */
        .name-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .name-modal.active { display: flex; }
        .name-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: modal-pop 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .name-card h2 { font-size: 2rem; margin-bottom: 1rem; color: var(--text-main); }
        .name-card p { color: var(--slate-400); margin-bottom: 2rem; }
        .name-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .name-input:focus { border-color: var(--subject-accent); }
        .name-submit {
            width: 100%;
            background: var(--subject-accent);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .name-submit:hover { transform: scale(1.05); }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            html, body { overflow-x: hidden; width: 100%; position: relative; }
            .hero { padding: 3rem 0 2rem; }
            .logo-boss { font-size: 3.4rem; letter-spacing: -0.02em; }
            .logo-files { font-size: 0.9rem; letter-spacing: 0.2em; margin-top: 0.1rem; }
            .hero-greeting { margin-top: 1.75rem; font-size: 1.1rem !important; padding: 0 1.5rem; line-height: 1.5; font-weight: 700; color: var(--text-main) !important; }
            
            .grid { grid-template-columns: 1fr; gap: 1rem; padding: 0 0.5rem; }
            .card { padding: 2rem 1rem; height: 10rem; border-radius: 20px; }
            .card h3 { font-size: 1.4rem; }
            
            .container { padding: 0 1rem; width: 100%; }
            .nav-content { padding: 0.5rem 0; gap: 0.5rem; }
            
            .search-input { width: 12rem; }
            .search-toggle { width: 2.5rem; height: 2.5rem; }
            
            .theme-toggle, .tasks-toggle, .app-download-link, .back-btn { width: 2.5rem; height: 2.5rem; }
            .nav-controls { gap: 0.5rem; }
            
            .update-banner { flex-direction: column; text-align: center; padding: 1.25rem; gap: 0.75rem; border-radius: 16px; margin-bottom: 2rem; }
            .update-icon { width: 2.2rem; height: 2.2rem; }
            .update-title { font-size: 1rem; }
            .update-desc { font-size: 0.85rem; }
            .weekly-links { justify-content: center; flex-wrap: wrap; gap: 0.4rem; }
            .weekly-link { font-size: 0.75rem; padding: 0.45rem 0.7rem; }

            .zone-header { padding: 4rem 0 2rem; }
            .zone-header h2 { font-size: 2.2rem !important; }
            .category-grid { grid-template-columns: 1fr; gap: 0.8rem; }
            .cat-card { padding: 1.75rem 1rem; border-radius: 20px; }
            .cat-icon { width: 3rem; height: 3rem; margin-bottom: 0.8rem; }
            .cat-card h4 { font-size: 1.3rem; }
            
            .file-row { padding: 0.9rem 1rem; gap: 0.8rem; border-radius: 16px; }
            .file-icon-box { width: 2.2rem; height: 2.2rem; }
            .file-name { font-size: 1rem; }
            
            .breadcrumb { flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.25rem; font-size: 0.65rem; }
            
            .name-card { padding: 1.75rem; border-radius: 20px; width: 95%; }
            .name-card h2 { font-size: 1.4rem; }
            
            .search-results.active { width: calc(100vw - 2rem); left: 1rem; right: 1rem; top: 65px; }
            
            .modal-content { width: 95%; padding: 1.75rem; border-radius: 20px; }
            
            .ramadan-decor { top: 4.5rem; right: 0.75rem; }
            .crescent { width: 2.2rem; height: 2.2rem; }
            
            .notification-toast { left: 0.75rem; right: 0.75rem; bottom: 0.75rem; padding: 0.8rem 1.25rem; width: auto; transform: translateY(200%); }
            .notification-toast.active { transform: translateY(0); }
            .lights-container { inset: -12px; }
            
            .ramadan-kareem-banner { font-size: 2.2rem !important; margin-bottom: 1rem; }
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 2rem; }

        /* Navigation - Stealth Dark */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 5rem;
            display: flex;
            align-items: center;
            background: rgba(var(--bg-deep-rgb), 0.8);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .nav-content { display: flex; justify-content: center; align-items: center; width: 100%; position: relative; min-height: 4rem; }
        .nav-controls {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.4rem 1rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        /* Icon Notification Styles */
        .icon-notif {
            position: absolute;
            top: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: var(--subject-accent);
            color: white;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            white-space: nowrap;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1100;
        }
        .icon-notif::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-bottom-color: var(--subject-accent);
        }
        .icon-notif.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .icon-notif.download { background: #4CAF50; }
        .icon-notif.download::before { border-bottom-color: #4CAF50; }

        .theme-toggle, .tasks-toggle, .app-download-link, .back-btn, .search-toggle {
            position: relative;
            width: 2.8rem; height: 2.8rem;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .back-btn { background: rgba(255,255,255,0.05); border-color: var(--glass-border); color: var(--slate-400); display: none; }
        .back-btn.active { display: flex; }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; transform: scale(1.1); }

        .search-toggle { background: rgba(255,255,255,0.05); border-color: var(--glass-border); color: var(--slate-400); }
        .search-toggle:hover { background: rgba(255,255,255,0.1); color: #fff; transform: scale(1.1); }
        .search-toggle.active { color: var(--subject-accent); border-color: var(--subject-accent); }

        .theme-toggle { background: rgba(var(--subject-accent-rgb), 0.1); border-color: var(--glass-border); color: var(--subject-accent); }
        .theme-toggle:hover { transform: scale(1.1); background: rgba(var(--subject-accent-rgb), 0.2); }

        .tasks-toggle { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3); color: #3b82f6; }
        .tasks-toggle:hover { background: #3b82f6; color: #fff; transform: scale(1.1); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        .app-download-link { background: rgba(76, 175, 80, 0.1); border-color: rgba(76, 175, 80, 0.3); color: #4CAF50; text-decoration: none; }
        .app-download-link:hover { background: #4CAF50; color: #fff; transform: scale(1.1); box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3); }

        .search-container {
            position: absolute;
            right: 0;
            display: flex;
            align-items: center;
        }
        .tasks-container {
            padding: 2rem 0;
            animation: fadeIn 0.5s ease;
        }
        .tasks-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .tasks-header h2 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, var(--subject-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        .quote-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 3rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .quote-card::before {
            content: '“';
            position: absolute;
            top: -10px;
            left: 20px;
            font-size: 5rem;
            opacity: 0.1;
            font-family: serif;
        }
        .quote-text {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            color: var(--text-main);
            line-height: 1.8;
            margin-bottom: 1rem;
        }
        .quote-author {
            font-size: 0.9rem;
            color: var(--subject-accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .task-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        .task-card:hover {
            transform: translateY(-5px);
            border-color: var(--subject-accent);
            background: rgba(var(--subject-accent-rgb), 0.05);
        }
        .task-subject {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-list {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .task-list::-webkit-scrollbar { width: 4px; }
        .task-list::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        
        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .task-item:hover { background: rgba(255,255,255,0.08); }
        .task-item.done { opacity: 0.5; border-color: rgba(76, 175, 80, 0.2); }
        .task-item.done .task-check { background: #4CAF50; border-color: #4CAF50; }
        
        .task-check {
            width: 18px; height: 18px;
            border: 2px solid var(--slate-400);
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .task-check svg { display: none; }
        .task-item.done .task-check svg { display: block; }

        .task-progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .task-progress-fill {
            height: 100%;
            background: var(--subject-accent);
            transition: width 1s ease-in-out;
        }
        .task-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--slate-400);
            font-weight: 600;
        }
        .task-status {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            background: rgba(var(--subject-accent-rgb), 0.1);
            color: var(--subject-accent);
        }

        .privacy-note {
            margin-top: 4rem;
            background: rgba(var(--subject-accent-rgb), 0.05);
            border: 1px solid rgba(var(--subject-accent-rgb), 0.2);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            animation: slideUp 0.5s ease;
        }
        .privacy-icon {
            width: 3.5rem;
            height: 3.5rem;
            background: rgba(var(--subject-accent-rgb), 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--subject-accent);
            flex-shrink: 0;
        }
        .privacy-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--slate-300);
        }
        .privacy-text strong {
            color: #fff;
            display: block;
            margin-bottom: 0.25rem;
            font-size: 1.1rem;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Video Widget Styles */
        .video-widget {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            width: 180px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            z-index: 1500;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            animation: slideInLeft 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .video-widget.active { display: flex; }
        .video-widget.fullscreen {
            width: 100vw;
            height: 100vh;
            bottom: 0;
            left: 0;
            border-radius: 0;
            background: #000;
            z-index: 2000;
        }
        
        .video-widget-header {
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--glass-border);
        }
        .video-widget-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--subject-accent);
            letter-spacing: 0.05em;
        }
        .video-widget-close {
            cursor: pointer;
            color: var(--slate-400);
            transition: color 0.2s;
        }
        .video-widget-close:hover { color: #ff4444; }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 9/16;
            background: #000;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: object-fit 0.5s;
        }
        .video-widget.fullscreen .video-container {
            height: 100%;
            aspect-ratio: auto;
        }
        .video-widget.fullscreen .video-container video {
            object-fit: contain;
        }
        
        .video-controls-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .video-container:hover .video-controls-overlay,
        .video-container.paused .video-controls-overlay { opacity: 1; }
        
        .play-pause-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .video-widget {
                bottom: 1rem;
                left: 1rem;
                width: 140px;
            }
        }

        .search-input {
            width: 100%;
            background: rgba(var(--bg-deep-rgb), 0.98);
            border: 1px solid var(--subject-accent);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            outline: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .search-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1100;
            background: rgba(var(--bg-deep-rgb), 0.8);
            backdrop-filter: blur(15px);
            padding: 0 1rem;
        }
        .search-container.active { display: flex; }

        .search-input-wrapper {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .search-results {
            position: absolute;
            top: calc(100% + 0.5rem);
            left: 0;
            width: 100%;
            background: rgba(var(--bg-deep-rgb), 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            max-height: 25rem;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            padding: 0.75rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .search-results.active { display: flex; }
        .search-item {
            padding: 1rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid transparent;
        }
        .search-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--glass-border);
            transform: translateX(5px);
        }
        .search-item-icon {
            width: 2.5rem; height: 2.5rem;
            background: rgba(var(--subject-accent-rgb), 0.1);
            color: var(--subject-accent);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .search-item-info { flex-grow: 1; }
        .search-item-name { font-weight: 700; color: var(--text-main); font-size: 0.95rem; }
        .search-item-meta { font-size: 0.7rem; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.05em; }
        
        .no-results {
            padding: 2rem;
            text-align: center;
            color: var(--slate-400);
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* Notification Toast */
        .notification-toast {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            background: rgba(var(--bg-deep-rgb), 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--subject-accent);
            border-radius: 20px;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            z-index: 3000;
            transform: translateX(-150%);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(var(--subject-accent-rgb), 0.2);
        }
        .notification-toast.active { transform: translateX(0); }
        .notif-icon {
            width: 2.5rem; height: 2.5rem;
            background: var(--subject-accent);
            color: #fff;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            animation: pulse-notif 2s infinite;
        }
        @keyframes pulse-notif {
            0% { box-shadow: 0 0 0 0 rgba(var(--subject-accent-rgb), 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(var(--subject-accent-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--subject-accent-rgb), 0); }
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(76, 175, 80, 0); }

    <script>
        const PSYCH_DRIVE_RECORDS = "https://drive.google.com/drive/folders/1S-HWc1tXMPMdZ27NETHg_sGiFyu2hljx?usp=sharing";
        const GENERAL_TELEGRAM = "https://t.me/theboss230";

        const SUBJECTS = [
            { id: 'oral-path', name: 'Oral Pathology', color: '#3b82f6', colorRGB: '59, 130, 246', filesCount: { Lecture: 14, Section: 10, Question: 10, Extra: 5, Recording: 1 } },
            { id: 'pharma', name: 'Pharmacology', color: '#ef4444', colorRGB: '239, 68, 68', filesCount: { Lecture: 14, Section: 10, Question: 10, Extra: 5, Recording: 1 } },
            { id: 'psych', name: 'Psychology', color: '#8b5cf6', colorRGB: '139, 92, 246', filesCount: { Lecture: 14, Section: 0, Question: 10, Extra: 5, Recording: 1 } },
            { id: 'tech-fixed-2', name: 'Tech Fixed 2', color: '#10b981', colorRGB: '16, 185, 129', filesCount: { Lecture: 14, Section: 10, Question: 10, Extra: 5, Recording: 1 } },
            { id: 'tech-op', name: 'Tech-Operative', color: '#14b8a6', colorRGB: '20, 184, 166', filesCount: { Lecture: 14, Section: 10, Question: 10, Extra: 5, Recording: 1 } },
            { id: 'tech-rem', name: 'Tech-Removable', color: '#f59e0b', colorRGB: '245, 158, 11', filesCount: { Lecture: 14, Section: 10, Question: 10, Extra: 5, Recording: 1 } }
        ];

        const generateFiles = (subject) => {
            const files = [];
            const types = ['Lecture', 'Section', 'Question', 'Extra', 'Recording'];
            const abbr = { Lecture: 'Lec', Section: 'Sec', Question: 'Q', Extra: 'EX', Recording: 'Rec' };

            types.forEach(type => {
                const count = subject.filesCount[type] || 0;
                for (let i = 1; i <= count; i++) {
                    let path = '#';
                    let displayName = `${subject.name} ${type} ${i}`;
                    if (type === 'Recording') {
                        path = (subject.id === 'psych') ? PSYCH_DRIVE_RECORDS : GENERAL_TELEGRAM;
                        displayName = (subject.id === 'psych') ? "Cloud Sync Archive" : "Telegram Core Link";
                    } else {
                        path = `${i} ${abbr[type]} ${subject.name}.pdf`;
                    }
                    files.push({ id: `${subject.id}-${type}-${i}`, number: i, type, name: displayName, fileName: path, isExternal: type === 'Recording' });
                }
            });
            return files;
        };

        const SUBJECT_DATA = SUBJECTS.map(s => ({ ...s, files: generateFiles(s) }));

        const app = {
            view: 'home',
            selectedSubject: null,
            selectedCategory: null,
            activeFile: null,
            history: [],
            videoFullscreenTimer: null,

            async startIntro() {
                const video = document.getElementById('intro-video');
                const skipBtn = document.getElementById('intro-skip');
                if (video) {
                    const videoUrl = 'intro.mp4';
                    try {
                        video.onended = () => this.hideIntro();
                        video.onerror = () => {
                            console.warn("Intro video error, skipping.");
                            this.hideIntro();
                        };

                        const response = await fetch(videoUrl, { method: 'HEAD' });
                        const contentType = response.headers.get('content-type');
                        if (response.ok && contentType && contentType.startsWith('video/')) {
                            video.src = videoUrl;
                            video.muted = false;
                            video.volume = 1.0;
                            
                            // Attempt to play with sound immediately
                            const playPromise = video.play();
                            
                            if (playPromise !== undefined) {
                                playPromise.catch(error => {
                                    console.warn("Autoplay with sound was blocked by browser. Playing muted as fallback.");
                                    video.muted = true;
                                    video.play();
                                    
                                    // Unmute on first user interaction with the page
                                    const unmute = () => {
                                        video.muted = false;
                                        video.volume = 1.0;
                                        window.removeEventListener('click', unmute);
                                        window.removeEventListener('touchstart', unmute);
                                    };
                                    window.addEventListener('click', unmute);
                                    window.addEventListener('touchstart', unmute);
                                });
                            }

                            // Show skip button after 3 seconds
                            setTimeout(() => {
                                if (skipBtn) skipBtn.classList.add('visible');
                            }, 3000);
                        } else {
                            console.warn("intro.mp4 not found or invalid type, skipping intro.");
                            this.hideIntro();
                            return;
                        }
                    } catch (e) {
                        console.warn("Error checking intro video:", e);
                        this.hideIntro();
                        return;
                    }
                    
                    // Force hide after exactly 10 seconds as requested (or longer if video is longer)
                    // But user asked for it to be like an ad, so let's keep a safety timeout
                    setTimeout(() => this.hideIntro(), 15000);
                }
            },

            unmuteIntro() {
                const video = document.getElementById('intro-video');
                if (video) {
                    video.muted = false;
                }
            },

            hideIntro() {
                const overlay = document.getElementById('intro-overlay');
                if (overlay) {
                    overlay.classList.add('hidden');
                    // Now check for name modal
                    const savedName = localStorage.getItem('boss_user_name');
                    if (!savedName) {
                        const modal = document.getElementById('name-modal');
                        if (modal) modal.classList.add('active');
                    }
                }
            },

            async initVideoWidget() {
                const widget = document.getElementById('video-widget');
                const video = document.getElementById('heart-video');
                if (!widget || !video) return;

                // Handle errors
                video.onerror = () => {
                    console.warn(`Video error. Widget will be hidden.`);
                    this.closeVideoWidget();
                };

                // Pick random video 1-6
                const randomNum = Math.floor(Math.random() * 6) + 1;
                const videoUrl = `${randomNum}.mp4`;
                
                try {
                    // Check if file exists before setting src to avoid console errors
                    const response = await fetch(videoUrl, { method: 'HEAD' });
                    const contentType = response.headers.get('content-type');
                    if (response.ok && contentType && contentType.startsWith('video/')) {
                        video.src = videoUrl;
                        
                        // Show widget after 3 seconds
                        setTimeout(() => {
                            // Only show if no error occurred
                            if (video.networkState === 3 || video.error) return;
                            
                            widget.classList.add('active');
                            
                            // Auto-close after 60 seconds
                            setTimeout(() => {
                                this.closeVideoWidget();
                            }, 60000);
                        }, 3000);
                    } else {
                        console.warn(`Video ${videoUrl} not found or invalid type. Widget will be hidden.`);
                    }
                } catch (e) {
                    console.warn(`Error checking video ${videoUrl}:`, e);
                }
            },

            closeVideoWidget() {
                const widget = document.getElementById('video-widget');
                const video = document.getElementById('heart-video');
                if (widget) {
                    widget.classList.remove('active');
                    widget.classList.remove('fullscreen');
                }
                if (video) video.pause();
                if (this.videoFullscreenTimer) {
                    clearTimeout(this.videoFullscreenTimer);
                    this.videoFullscreenTimer = null;
                }
            },

            toggleVideoPlay() {
                const video = document.getElementById('heart-video');
                const container = document.querySelector('.video-container');
                const widget = document.getElementById('video-widget');
                const playIcon = document.getElementById('play-icon');
                const pauseIcon = document.getElementById('pause-icon');
                
                if (video.paused) {
                    video.play();
                    container.classList.remove('paused');
                    playIcon.style.display = 'none';
                    pauseIcon.style.display = 'block';

                    // Start timer for fullscreen
                    if (this.videoFullscreenTimer) clearTimeout(this.videoFullscreenTimer);
                    this.videoFullscreenTimer = setTimeout(() => {
                        if (!video.paused) {
                            widget.classList.add('fullscreen');
                        }
                    }, 4000);
                } else {
                    video.pause();
                    container.classList.add('paused');
                    playIcon.style.display = 'block';
                    pauseIcon.style.display = 'none';

                    // Cancel fullscreen timer
                    if (this.videoFullscreenTimer) {
                        clearTimeout(this.videoFullscreenTimer);
                        this.videoFullscreenTimer = null;
                    }
                    widget.classList.remove('fullscreen');
                }
            },

            init() {
                this.render();
                this.initCanvas();
                this.initTheme();
                this.initVideoWidget();
                this.startIntro();
                
                // Check for user name - MOVED TO hideIntro or delayed
                const savedName = localStorage.getItem('boss_user_name');
                if (!savedName) {
                    // We don't show it immediately anymore, it shows after intro
                    // modal.classList.add('active');
                    
                    // Add Enter key listener
                    document.getElementById('user-name-input').addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') this.submitName();
                    });
                } else {
                    // If name exists, we still need to hide intro to show content
                    // But intro overlay is visible by default, so it stays until user clicks
                }

                // Request notification permission
                if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();
                }

                // Show App Download notification (Icon Dropdown)
                setTimeout(() => {
                    const downloadNotif = document.getElementById('download-notif');
                    if (downloadNotif) {
                        downloadNotif.classList.add('active');
                        setTimeout(() => downloadNotif.classList.remove('active'), 5000);
                    }
                }, 4000);

                // Show Tasks notification (Icon Dropdown)
                setTimeout(() => {
                    const tasksNotif = document.getElementById('tasks-notif');
                    if (tasksNotif) {
                        tasksNotif.classList.add('active');
                        setTimeout(() => tasksNotif.classList.remove('active'), 5000);
                    }
                }, 10000); // Increased delay to 10s to avoid overlap (4s + 5s = 9s)
            },

            submitName() {
                const input = document.getElementById('user-name-input');
                const name = input.value.trim();
                if (name) {
                    localStorage.setItem('boss_user_name', name);
                    document.getElementById('name-modal').classList.remove('active');
                    this.render(); // Re-render to show name
                }
            },

            initTheme() {
                // Default to dark mode unless explicitly set to light
                const theme = localStorage.getItem('boss_theme');
                if (theme === 'light') {
                    document.documentElement.classList.add('light-mode');
                } else {
                    document.documentElement.classList.remove('light-mode');
                }
                this.updateThemeIcon();
            },

            toggleTheme() {
                document.documentElement.classList.toggle('light-mode');
                const isLight = document.documentElement.classList.contains('light-mode');
                localStorage.setItem('boss_theme', isLight ? 'light' : 'dark');
                this.updateThemeIcon();
                this.updateTheme(this.selectedSubject?.color, this.selectedSubject?.colorRGB);
            },

            updateThemeIcon() {
                const icon = document.getElementById('theme-icon');
                if (document.documentElement.classList.contains('light-mode')) {
                    icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
                } else {
                    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
                }
            },

            updateTheme(color, rgb) {
                const logo = document.querySelector('.logo-3d');
                const notifToast = document.getElementById('notif-toast');
                const isLight = document.documentElement.classList.contains('light-mode');

                if (color && logo) {
                    logo.style.textShadow = isLight 
                        ? `0 1px 0 #ddd, 0 2px 0 #ccc, 0 10px 50px rgba(${rgb}, 0.3)`
                        : `0 1px 0 #333, 0 2px 0 #111, 0 10px 50px rgba(${rgb}, 0.5)`;
                    
                    document.documentElement.style.setProperty('--subject-accent', color);
                    document.documentElement.style.setProperty('--subject-accent-rgb', rgb);
                    document.documentElement.style.setProperty('--subject-accent-low', `rgba(${rgb}, 0.1)`);
                    
                    if (notifToast) notifToast.style.borderColor = color;
                    
                    // Deep immersive background calculation
                    const factor = isLight ? 0.98 : 0.05;
                    const rgbArr = rgb.split(',').map(x => Math.floor(parseInt(x) * factor));
                    const deepRgb = rgbArr.join(',');
                    document.documentElement.style.setProperty('--bg-deep-rgb', deepRgb);
                    document.documentElement.style.setProperty('--bg-deep', `rgb(${deepRgb})`);
                    
                    document.body.style.backgroundColor = `var(--bg-deep)`;
                    window.starColor = isLight ? `rgba(15, 23, 42, ` : `rgba(${rgb}, `;
                } else if (logo) {
                    logo.style.textShadow = isLight
                        ? `0 1px 0 #ddd, 0 2px 0 #ccc, 0 10px 40px rgba(59, 130, 246, 0.2)`
                        : `0 1px 0 #333, 0 2px 0 #222, 0 3px 0 #111, 0 4px 0 #000, 0 10px 40px rgba(59, 130, 246, 0.4)`;
                    
                    document.documentElement.style.setProperty('--subject-accent', '#3b82f6');
                    document.documentElement.style.setProperty('--subject-accent-rgb', '59, 130, 246');
                    document.documentElement.style.setProperty('--subject-accent-low', 'rgba(59, 130, 246, 0.1)');
                    
                    if (isLight) {
                        document.documentElement.style.setProperty('--bg-deep-rgb', '248, 250, 252');
                        document.documentElement.style.setProperty('--bg-deep', '#f8fafc');
                        document.body.style.backgroundColor = '#f8fafc';
                        window.starColor = `rgba(15, 23, 42, `;
                    } else {
                        document.documentElement.style.setProperty('--bg-deep-rgb', '2, 6, 23');
                        document.documentElement.style.setProperty('--bg-deep', '#020617');
                        document.body.style.backgroundColor = '#020617';
                        window.starColor = `rgba(255, 255, 255, `;
                    }
                    if (notifToast) notifToast.style.borderColor = '#3b82f6';
                }
            },

            navigate(view, subId = null, cat = null) {
                const root = document.getElementById('app-root');
                if (root) {
                    root.classList.remove('active');
                }

                setTimeout(() => {
                    // Save current state to history before navigating
                    if (this.view !== view || (subId && this.selectedSubject?.id !== subId) || (cat && this.selectedCategory !== cat)) {
                        this.history.push({ view: this.view, subId: this.selectedSubject?.id, cat: this.selectedCategory });
                    }

                    this.view = view;
                    this.selectedSubject = subId ? SUBJECT_DATA.find(s => s.id === subId) : null;
                    this.selectedCategory = cat;
                    
                    // Update back button visibility
                    const backBtn = document.getElementById('back-btn');
                    if (backBtn) {
                        if (this.history.length > 0) backBtn.classList.add('active');
                        else backBtn.classList.remove('active');
                    }

                    // CRITICAL: Scroll to top on every navigation
                    window.scrollTo(0, 0);
                    document.documentElement.scrollTop = 0;
                    document.body.scrollTop = 0;
                    
                    this.render();
                    
                    if (root) {
                        requestAnimationFrame(() => {
                            root.classList.add('active');
                        });
                    }
                }, 300);
            },

            goBack() {
                if (this.history.length > 0) {
                    const prev = this.history.pop();
                    this.view = prev.view;
                    this.selectedSubject = prev.subId ? SUBJECT_DATA.find(s => s.id === prev.subId) : null;
                    this.selectedCategory = prev.cat;

                    const backBtn = document.getElementById('back-btn');
                    if (backBtn) {
                        if (this.history.length > 0) backBtn.classList.add('active');
                        else backBtn.classList.remove('active');
                    }

                    this.render();
                    setTimeout(() => this.updateTheme(this.selectedSubject?.color, this.selectedSubject?.colorRGB), 50);
                }
            },

            render() {
                const root = document.getElementById('app-root');
                if (this.view === 'home') root.innerHTML = this.renderHome();
                else if (this.view === 'subject') root.innerHTML = this.renderSubjectZone();
                else if (this.view === 'category') root.innerHTML = this.renderCategoryFiles();
                else if (this.view === 'tasks') root.innerHTML = this.renderTasks();
                
                if (this.view === 'home') this.attachCardEffects();
                
                // Ensure theme is applied after render
                this.updateTheme(this.selectedSubject?.color, this.selectedSubject?.colorRGB);
            },

            renderHome() {
                const updateInfo = this.getWeeklyUpdate();
                const userName = localStorage.getItem('boss_user_name') || 'يا بطل';
                const bannerText = updateInfo.isEid ? 'عيد سعيد' : 'BOSS Files';
                const bannerClass = updateInfo.isEid ? 'eid-banner' : 'ramadan-kareem-banner';
                
                return `
                    <div class="hero">
                        <div class="${bannerClass}">${bannerText}</div>
                        <div class="logo-container">
                            <div class="logo-boss">BOSS</div>
                            <div class="logo-files">Files</div>
                            <div class="lights-container">
                                ${this.generateIslamicDecor()}
                            </div>
                        </div>
                        <div class="hero-greeting">
                            منور يا ${userName}! جاهز تذاكر إيه النهاردة؟
                        </div>
                    </div>

                    <div class="grid">
                        <div class="card" onclick="app.navigate('tasks')" style="border-color: #3b82f6; background: rgba(59, 130, 246, 0.05);">
                            <h3 style="color: #3b82f6;">Study Tasks</h3>
                            <span>WEEKLY PROGRESS</span>
                            <div class="energy-aura" style="--aura-color: #3b82f6;"></div>
                        </div>
                        ${SUBJECT_DATA.map(s => `
                            <div class="card" onclick="app.navigate('subject', '${s.id}')">
                                <h3>${s.name}</h3>
                                <span>${s.files.length} ASSETS</span>
                                <div class="energy-aura" style="--aura-color: ${s.color};"></div>
                            </div>
                        `).join('')}
                    </div>
                `;
            },

            getWeeklyUpdate() {
                // Reference: Saturday Feb 7, 2026 was Week 1
                const referenceDate = new Date('2026-02-07T00:00:00');
                const now = new Date();
                
                // Calculate weeks passed since reference date
                const diffTime = now - referenceDate;
                const weeksPassed = Math.floor(diffTime / (7 * 24 * 60 * 60 * 1000));
                
                let weekNum = 1 + weeksPassed;
                
                // Ensure we don't go below 1
                if (weekNum < 1) weekNum = 1;

                // Eid check: March 21-22, 2026
                const isEid = now.getMonth() === 2 && (now.getDate() === 21 || now.getDate() === 22);
                
                return {
                    weekNum: weekNum,
                    isCelebration: weekNum > 14,
                    isEid: isEid
                };
            },

            showAppStatus() {
                this.showToast('يتم تحديث التطبيق ووجود بعض التعديلات.. انتظرونا قريباً! 🛠️');
            },

                    { text: "حتى لو مش طايق… اعمل اللي عليك 😤", author: "Boss" },
                    { text: "النجاح مش بالحظ… بالعرق 💦", author: "Boss" },
                    { text: "اللي بيتعب شوية بيوصل أسرع 🚀", author: "Boss" },
                    { text: "ذاكر عشان تبقى فخور بنفسك مش عشان حد 👌", author: "Boss" },
                    { text: "مفيش إحساس أحلى من إنك تكون جاهز 😌", author: "Boss" },
                    { text: "لو وقعت قوم تاني… بس متقعدش ❌", author: "Boss" },
                    { text: "كل دقيقة تركيز بتفرق 🔥", author: "Boss" },
                    { text: "خليك تقيل كده على نفسك واشتغل 🧠", author: "Boss" },
                    { text: "متخليش الكسل يكسبك 😴🚫", author: "Boss" },
                    { text: "افتح الكتاب حتى لو غصب عنك… البداية أهم حاجة 📖", author: "Boss" },
                    { text: "ركز في خطوتك الجاية بس 👣", author: "Boss" },
                    { text: "انت بتبني مستقبلك سطر سطر ✍️", author: "Boss" },
                    { text: "سيب الأعذار للي مش عايز ينجح 🙅‍♂️", author: "Boss" },
                    { text: "قوم دلوقتي حالًا… مفيش بعدين ⏰", author: "Boss" },
                    { text: "خليك فاكر إن حلمك مستاهل 💫", author: "Boss" },
                    { text: "كل تعب ليه مقابل 👑", author: "Boss" },
                    { text: "النجاح بيحب الناس اللي بتسعى ❤️🔥", author: "Boss" },
                    { text: "لو محدش شايف تعبك… ربنا شايف 🤍", author: "Boss" },
                    { text: "متستناش حد يشجعك… شجع نفسك 👏", author: "Boss" },
                    { text: "انت مشروع نجاح ماشي على الأرض 😎", author: "Boss" },
                    { text: "ركز في هدفك وسيب الدوشة 🎧📚", author: "Boss" },
                    { text: "خليك سابق نفسك كل يوم 🏃‍♂️", author: "Boss" },
                    { text: "اللي يزرع يحصد… ازرع مذاكرة 🌱", author: "Boss" },
                    { text: "قوم خلص اللي وراك عشان تنام وانت مرتاح 😴✨", author: "Boss" },
                    { text: "يلا بقى كفاية كلام… افتح الكتاب وابدأ دلوقتي 🔥📖", author: "Boss" }
                ];
                const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
                
                // Get completed tasks from localStorage
                const completedTasks = JSON.parse(localStorage.getItem('boss_tasks_done_v2') || '{}');

                return `
                    <div class="tasks-container">
                        <div class="tasks-header">
                            <h2>Study Plan & Tasks</h2>
                            <p style="color: var(--slate-400); font-weight: 600;">Track your academic progress and stay ahead of the curve.</p>
                        </div>

                        <div class="quote-card">
                            <div class="quote-text">${randomQuote.text}</div>
                            <div class="quote-author">— ${randomQuote.author}</div>
                        </div>

                        <div class="task-grid">
                            ${SUBJECT_DATA.map(s => {
                                const isDelayed = s.id === 'psych' || s.id === 'oral-path';
                                const availableLecs = isDelayed ? updateInfo.weekNum - 1 : updateInfo.weekNum;
                                const safeLecs = Math.max(0, Math.min(14, availableLecs));
                                
                                // Section logic: Oral Path (2 sections), Pharma (1 section)
                                let availableSecs = 0;
                                if (s.id === 'oral-path') availableSecs = updateInfo.weekNum - 1;
                                else if (s.id === 'pharma') availableSecs = updateInfo.weekNum - 2;
                                const safeSecs = Math.max(0, availableSecs);

                                const subjectDone = completedTasks[s.id] || [];
                                
                                // Count total available tasks (lecs + secs)
                                const totalAvailable = safeLecs + safeSecs;
                                const doneCount = subjectDone.length;
                                const progress = totalAvailable > 0 ? (doneCount / totalAvailable) * 100 : 0;
                                
                                let taskItems = '';
                                
                                // Render Lectures
                                for (let i = 1; i <= safeLecs; i++) {
                                    const taskId = `lec-${i}`;
                                    const isDone = subjectDone.includes(taskId);
                                    taskItems += `
                                        <div class="task-item ${isDone ? 'done' : ''}" onclick="app.toggleTask('${s.id}', '${taskId}')">
                                            <div class="task-check">
                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                            </div>
                                            <span style="font-size: 0.85rem; font-weight: 700;">Lecture ${i}</span>
                                        </div>
                                    `;
                                }

                                // Render Sections
                                for (let i = 1; i <= safeSecs; i++) {
                                    const taskId = `sec-${i}`;
                                    const isDone = subjectDone.includes(taskId);
                                    taskItems += `
                                        <div class="task-item ${isDone ? 'done' : ''}" onclick="app.toggleTask('${s.id}', '${taskId}')">
                                            <div class="task-check">
                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                            </div>
                                            <span style="font-size: 0.85rem; font-weight: 700;">Section ${i}</span>
                                        </div>
                                    `;
                                }

                                return `
                                    <div class="task-card">
                                        <div class="task-subject">
                                            <span>${s.name}</span>
                                            <span class="task-status">${doneCount >= totalAvailable && totalAvailable > 0 ? 'COMPLETED' : 'IN PROGRESS'}</span>
                                        </div>
                                        <div class="task-progress-bar">
                                            <div class="task-progress-fill" style="width: ${progress}%; background: ${s.color};"></div>
                                        </div>
                                        <div class="task-stats">
                                            <span>DONE: ${doneCount} / ${totalAvailable}</span>
                                            <span>${Math.round(progress)}%</span>
                                        </div>
                                        <div class="task-list">
                                            ${taskItems || '<div style="text-align:center; padding:1rem; opacity:0.5; font-size:0.8rem;">No tasks unlocked yet.</div>'}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>

                        <div class="privacy-note">
                            <div class="privacy-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            </div>
                            <div class="privacy-text">
                                <strong>خصوصية بياناتك:</strong> جميع مهامك وتقدمك الدراسي يتم تخزينها محلياً على جهازك فقط. مستحيل أي شخص (بما في ذلك صاحب الموقع) يقدر يوصل لبياناتك أو يعرف إنت ذاكرت إيه. بياناتك ملكك إنت وبس.
                            </div>
                        </div>
                    </div>
                `;
            },

            toggleTask(subId, taskId) {
                const completedTasks = JSON.parse(localStorage.getItem('boss_tasks_done_v2') || '{}');
                if (!completedTasks[subId]) completedTasks[subId] = [];
                
                const index = completedTasks[subId].indexOf(taskId);
                if (index > -1) {
                    completedTasks[subId].splice(index, 1);
                } else {
                    completedTasks[subId].push(taskId);
                }
                
                localStorage.setItem('boss_tasks_done_v2', JSON.stringify(completedTasks));
                this.render();
                
                // Haptic feedback if supported
                if ("vibrate" in navigator) navigator.vibrate(50);
            },

            goToWeeklyFile(subId, weekNum) {
                const fileId = `${subId}-Lecture-${weekNum}`;
                // Navigate to the category first to ensure context
                this.navigate('category', subId, 'Lecture');
                // Then open the file actions
                setTimeout(() => this.openFileActions(fileId), 100);
            },

            generateIslamicDecor() {
                const updateInfo = this.getWeeklyUpdate();
                let decor = '';
                const items = updateInfo.isEid ? [
                    '<circle cx="12" cy="12" r="10"/>' // Circle (Balloon-like)
                ] : [
                    '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>', // Star
                    '<path d="M12 3a9 9 0 1 0 9 9 9.75 9.75 0 0 1-9-9z"/>' // Crescent
                ];
                const colors = ['#ffd700', '#ffffff', '#ff8c00'];
                for(let i = 0; i < 10; i++) {
                    const angle = (i / 10) * Math.PI * 2;
                    const x = 50 + Math.cos(angle) * 60;
                    const y = 50 + Math.sin(angle) * 60;
                    const color = colors[i % colors.length];
                    const icon = items[i % items.length];
                    decor += `
                        <div class="islamic-item" style="left: ${x}%; top: ${y}%; color: ${color}; animation-delay: ${i * 0.2}s;">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">${icon}</svg>
                        </div>
                    `;
                }
                return decor;
            },

            renderSubjectZone() {
                const s = this.selectedSubject;
                const userName = localStorage.getItem('boss_user_name') || 'يا بطل';
                const categories = Object.keys(s.filesCount).filter(cat => s.filesCount[cat] > 0);
                
                return `
                    <div class="zone-header">
                        <div class="breadcrumb">
                            <span onclick="app.navigate('home')">SYSTEM CORE</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin:0 5px"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            <span style="color:var(--subject-accent)">${s.name}</span>
                        </div>
                        <h2 style="font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; letter-spacing:-0.05em; line-height:0.9; color:#fff">${s.name}</h2>
                        <p style="color: var(--slate-400); font-weight: 600; margin-top: 1.5rem; font-size: 1.1rem;">يا ${userName}، دي كل ملفات الـ ${s.name} اللي محتاجها:</p>
                        <div class="category-grid">
                            ${categories.map(cat => `
                                <div class="cat-card" onclick="app.navigate('category', '${s.id}', '${cat}')">
                                    <div class="cat-icon">
                                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                            ${this.getCatIcon(cat)}
                                        </svg>
                                    </div>
                                    <h4>${cat}s</h4>
                                    <p>${s.filesCount[cat]} verified</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            },

            renderCategoryFiles() {
                const s = this.selectedSubject;
                const cat = this.selectedCategory;
                const userName = localStorage.getItem('boss_user_name') || 'يا بطل';
                const files = s.files.filter(f => f.type === cat);

                return `
                    <div class="zone-header">
                        <div class="breadcrumb">
                            <span onclick="app.navigate('home')">CORE</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin:0 5px"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            <span onclick="app.navigate('subject', '${s.id}')">${s.name}</span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin:0 5px"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            <span style="color:var(--subject-accent)">${cat}s</span>
                        </div>
                        <h2 style="font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; margin-bottom: 1rem; color:#fff">${cat} Repository</h2>
                        <p style="color: var(--slate-400); font-weight: 600; margin-bottom: 2rem; font-size: 1.1rem;">يا ${userName}، اتفضل دي ملفات الـ ${cat} اللي طلبتها:</p>
                        <div class="file-list">
                            ${files.map(f => `
                                <div class="file-row" onclick="app.openFileActions('${f.id}')">
                                    <div class="file-icon-box">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                            ${f.type === 'Recording' ? '<path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>' : '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline>'}
                                        </svg>
                                    </div>
                                    <div style="flex-grow:1">
                                        <div class="file-name">${f.name}</div>
                                        <div class="file-meta">ACCESS: ${f.isExternal ? 'Cloud Sync' : 'Direct Link'}</div>
                                    </div>
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="color:var(--slate-400)"><polyline points="9 18 15 12 9 6"></polyline></svg>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            },

            getCatIcon(type) {
                if (type === 'Lecture') return '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>';
                if (type === 'Section') return '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line>';
                if (type === 'Question') return '<circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line>';
                if (type === 'Recording') return '<path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>';
                return '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line>';
            },

            attachCardEffects() {
                document.querySelectorAll('.card').forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const r = card.getBoundingClientRect();
                        const rotateX = (e.clientY - r.top - r.height/2) / 12;
                        const rotateY = (r.width/2 - (e.clientX - r.left)) / 12;
                        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-15px) scale(1.02)`;
                    });
                    card.addEventListener('mouseleave', () => card.style.transform = 'translateY(0) rotateX(0) rotateY(0) scale(1)');
                });
            },

            initCanvas() {
                const c = document.getElementById('cosmic-bg'), ctx = c.getContext('2d');
                window.starColor = `rgba(255, 255, 255, `;
                let w = c.width = window.innerWidth, h = c.height = window.innerHeight, stars = [];
                const init = () => { w = c.width = window.innerWidth; h = c.height = window.innerHeight; stars = Array.from({length:80}, () => ({x:Math.random()*w, y:Math.random()*h, r:Math.random()*1.5, o:Math.random(), s:Math.random()*0.005})); };
                const draw = () => { ctx.clearRect(0,0,w,h); stars.forEach(s => { s.o += s.s; if(s.o > 1 || s.o < 0) s.s *= -1; ctx.fillStyle=`${window.starColor}${s.o*0.25})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); };
                window.onresize = init; init(); draw();
            },
            
            handleSearch(v) {
                const resultsContainer = document.getElementById('search-results');
                if (!v || v.length < 1) {
                    resultsContainer.classList.remove('active');
                    return;
                }

                const query = v.toLowerCase();
                const matches = [];

                SUBJECT_DATA.forEach(subject => {
                    subject.files.forEach(file => {
                        if (file.name.toLowerCase().includes(query)) {
                            matches.push({ ...file, subjectName: subject.name, subjectColor: subject.color, subjectColorRGB: subject.colorRGB });
                        }
                    });
                });

                if (matches.length > 0) {
                    resultsContainer.innerHTML = matches.slice(0, 10).map(m => `
                        <div class="search-item" onclick="app.selectSearchResult('${m.id}', '${m.subjectName}')">
                            <div class="search-item-icon" style="color: ${m.subjectColor}; background: rgba(${m.subjectColorRGB || '59,130,246'}, 0.1)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    ${m.type === 'Recording' ? '<path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>' : '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline>'}
                                </svg>
                            </div>
                            <div class="search-item-info">
                                <div class="search-item-name">${m.name}</div>
                                <div class="search-item-meta">${m.subjectName} • ${m.type}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    resultsContainer.innerHTML = '<div class="no-results">NO MATCHING DATA FOUND</div>';
                }

                resultsContainer.classList.add('active');
            },

            closeSearch() {
                const container = document.querySelector('.search-container');
                const resultsContainer = document.getElementById('search-results');
                const toggle = document.querySelector('.search-toggle');
                
                if (container) container.classList.remove('active');
                if (resultsContainer) resultsContainer.classList.remove('active');
                if (toggle) toggle.classList.remove('active');
            },

            toggleSearch() {
                const container = document.querySelector('.search-container');
                const input = document.getElementById('main-search');
                const toggle = document.querySelector('.search-toggle');
                
                if (container.classList.contains('active')) {
                    this.closeSearch();
                } else {
                    container.classList.add('active');
                    toggle.classList.add('active');
                    input.focus();
                }
            },

            selectSearchResult(fileId, subjectName) {
                const subject = SUBJECT_DATA.find(s => s.name === subjectName);
                if (!subject) return;
                
                this.navigate('category', subject.id, subject.files.find(f => f.id === fileId).type);
                setTimeout(() => this.openFileActions(fileId), 100);
                this.closeSearch();
            },

            openFileActions(fileId) {
                const file = this.selectedSubject.files.find(f => f.id === fileId);
                if (!file) return;
                
                if (file.isExternal) {
                    window.open(file.fileName, '_blank');
                    return;
                }

                this.activeFile = file;
                document.getElementById('modal-file-name').innerText = file.name;
                const modal = document.getElementById('file-modal');
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('active'), 10);
            },

            closeFileActions() {
                const modal = document.getElementById('file-modal');
                modal.classList.remove('active');
                setTimeout(() => {
                    modal.style.display = 'none';
                    this.activeFile = null;
                }, 400);
            },

            viewFile() {
                if (!this.activeFile) return;
                window.open(this.activeFile.fileName, '_blank');
                this.closeFileActions();
            },

            downloadFile() {
                if (!this.activeFile) return;
                const link = document.createElement('a');
                link.href = this.activeFile.fileName;
                link.download = this.activeFile.fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                this.closeFileActions();
            },

            async shareFile() {
                if (!this.activeFile) return;
                const shareData = {
                    title: 'Boss Files - ' + this.activeFile.name,
                    text: `Check out this academic asset: ${this.activeFile.name}`,
                    url: window.location.origin + '/' + this.activeFile.fileName
                };

                try {
                    if (navigator.share) {
                        await navigator.share(shareData);
                    } else {
                        await navigator.clipboard.writeText(shareData.url);
                        alert('Link copied to clipboard!');
                    }
                } catch (err) {
                    console.error('Share failed:', err);
                }
                this.closeFileActions();
            }
        };

        window.onload = () => app.init();
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
